{% extends 'core/base.html' %}
{% block title %}Vendors - FishTeck{% endblock %}

{% block content %}
<div class="container-fluid mt-4 pb-5 px-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="d-flex align-items-center gap-2">
            <a href="{% url 'accounting_hub' %}" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-arrow-left"></i> Accounting
            </a>
            <h2 class="mb-0"><i class="bi bi-truck me-2"></i>Vendors</h2>
        </div>
        <div class="d-flex align-items-center gap-2">
            <span class="text-muted small" id="vendor-count"></span>
            <button class="btn btn-outline-primary btn-sm" onclick="openAddModal()">
                <i class="bi bi-plus me-1"></i>Add Vendor
            </button>
        </div>
    </div>

    <div class="row mb-3">
        <div class="col-md-4">
            <input type="text" id="vendor-search" class="form-control" placeholder="Search vendors..." oninput="renderTable()">
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-striped table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>Vendor Name</th>
                            <th>Contact</th>
                            <th>Phone</th>
                            <th>Email</th>
                            <th>Location</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="vendor-tbody">
                        <tr><td colspan="6" class="text-center text-muted py-4">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Add / Edit Vendor Modal -->
<div class="modal fade" id="vendorModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Add Vendor</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-id">
                <div id="modalError" class="alert alert-danger" style="display:none;"></div>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Name <span class="text-danger">*</span></label>
                        <input type="text" id="f-name" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Contact Name</label>
                        <input type="text" id="f-contact" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Phone</label>
                        <input type="text" id="f-phone" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Email</label>
                        <input type="email" id="f-email" class="form-control">
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-semibold">Address</label>
                        <input type="text" id="f-address" class="form-control">
                    </div>
                    <div class="col-md-5">
                        <label class="form-label fw-semibold">City</label>
                        <input type="text" id="f-city" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-semibold">State</label>
                        <input type="text" id="f-state" class="form-control" maxlength="2">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Zipcode</label>
                        <input type="text" id="f-zipcode" class="form-control">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-primary" onclick="saveVendor()">Save Vendor</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let allVendors = [];
let modal;

document.addEventListener('DOMContentLoaded', () => {
    modal = new bootstrap.Modal(document.getElementById('vendorModal'));
    loadVendors();
});

function getCookie(name) {
    const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
    return match ? decodeURIComponent(match[2]) : '';
}

async function loadVendors() {
    const res = await fetch('/api/vendors/list/');
    const data = await res.json();
    allVendors = data.vendors || [];
    renderTable();
}

function renderTable() {
    const search = document.getElementById('vendor-search').value.toLowerCase();
    const filtered = allVendors.filter(v => !search || v.name.toLowerCase().includes(search));
    document.getElementById('vendor-count').textContent = filtered.length + ' vendors';
    const tbody = document.getElementById('vendor-tbody');
    if (!filtered.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">No vendors found.</td></tr>';
        return;
    }
    tbody.innerHTML = filtered.map(v => `
        <tr>
            <td class="fw-semibold">${v.name}</td>
            <td class="small">${v.contact_name || '--'}</td>
            <td class="small">${v.phone || '--'}</td>
            <td class="small">${v.email || '--'}</td>
            <td class="small">${v.city ? v.city + (v.state ? ', ' + v.state : '') : '--'}</td>
            <td class="text-end text-nowrap">
                <button class="btn btn-outline-primary btn-sm" onclick="openEditModal(${v.id})"><i class="bi bi-pencil"></i></button>
                <button class="btn btn-outline-danger btn-sm" onclick="deleteVendor(${v.id})"><i class="bi bi-trash"></i></button>
            </td>
        </tr>
    `).join('');
}

function clearForm() {
    ['f-name','f-contact','f-phone','f-email','f-address','f-city','f-state','f-zipcode'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('edit-id').value = '';
    document.getElementById('modalError').style.display = 'none';
}

function openAddModal() {
    clearForm();
    document.getElementById('modalTitle').textContent = 'Add Vendor';
    modal.show();
}

function openEditModal(id) {
    clearForm();
    const v = allVendors.find(x => x.id === id);
    if (!v) return;
    document.getElementById('edit-id').value = id;
    document.getElementById('modalTitle').textContent = 'Edit Vendor';
    document.getElementById('f-name').value = v.name;
    document.getElementById('f-contact').value = v.contact_name;
    document.getElementById('f-phone').value = v.phone;
    document.getElementById('f-email').value = v.email;
    document.getElementById('f-address').value = v.address;
    document.getElementById('f-city').value = v.city;
    document.getElementById('f-state').value = v.state;
    document.getElementById('f-zipcode').value = v.zipcode;
    modal.show();
}

function saveVendor() {
    const id = document.getElementById('edit-id').value;
    const payload = {
        name: document.getElementById('f-name').value.trim(),
        contact_name: document.getElementById('f-contact').value.trim(),
        phone: document.getElementById('f-phone').value.trim(),
        email: document.getElementById('f-email').value.trim(),
        address: document.getElementById('f-address').value.trim(),
        city: document.getElementById('f-city').value.trim(),
        state: document.getElementById('f-state').value.trim(),
        zipcode: document.getElementById('f-zipcode').value.trim(),
    };
    if (!payload.name) {
        document.getElementById('modalError').textContent = 'Name is required.';
        document.getElementById('modalError').style.display = '';
        return;
    }
    const url = id ? `/api/vendors/${id}/update/` : '/api/vendors/create/';
    fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
        body: JSON.stringify(payload),
    })
    .then(r => r.json())
    .then(data => {
        if (data.error) {
            document.getElementById('modalError').textContent = data.error;
            document.getElementById('modalError').style.display = '';
            return;
        }
        modal.hide();
        loadVendors();
    });
}

function deleteVendor(id) {
    if (!confirm('Delete this vendor?')) return;
    fetch(`/api/vendors/${id}/delete/`, {
        method: 'POST',
        headers: { 'X-CSRFToken': getCookie('csrftoken') },
    }).then(() => loadVendors());
}
</script>
{% endblock %}
