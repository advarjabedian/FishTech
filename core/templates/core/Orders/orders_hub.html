{% extends 'core/base.html' %}
{% block title %}Orders - FishTeck{% endblock %}
{% block content %}
<div class="container mt-4">
    <h2 class="mb-4"><i class="bi bi-bag me-2"></i>Orders</h2>
    <div class="row justify-content-center">

        <div class="col-md-4 mb-3">
            <div class="card card-dashboard bg-primary bg-opacity-10" style="border-color: #0d6efd !important; transition: transform 0.3s ease, box-shadow 0.3s ease; cursor: pointer;" onclick="window.location.href='{% url 'customer_list' %}'">
                <div class="card-body text-center py-5">
                    <i class="bi bi-file-earmark-text" style="font-size: 3rem; color: #0d6efd; margin-bottom: 15px;"></i>
                    <h3>Profile Orders</h3>
                    <p class="text-muted">Sales orders and customer documents</p>
                    <a href="{% url 'customer_list' %}" class="btn btn-primary mt-2">View Profile Orders</a>
                </div>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card card-dashboard bg-danger bg-opacity-10" style="border-color: #dc3545 !important; transition: transform 0.3s ease, box-shadow 0.3s ease; cursor: pointer;" onclick="window.location.href='{% url 'order_requests' %}'">
                <div class="card-body text-center py-5">
                    <i class="bi bi-envelope-paper" style="font-size: 3rem; color: #dc3545; margin-bottom: 15px;"></i>
                    <h3>Order Requests</h3>
                    <p class="text-muted">Email and SMS orders from customers</p>
                    <a href="{% url 'order_requests' %}" class="btn btn-danger mt-2">View Order Requests</a>
                </div>
            </div>
        </div>

    </div>
</div>
{% endblock %}
