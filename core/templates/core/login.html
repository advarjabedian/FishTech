<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FishTeck – Sign In</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐟</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0a1628;
            --deep: #0d1f3c;
            --teal: #00b4d8;
            --seafoam: #48cae4;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Sora', sans-serif;
            background: var(--navy);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(0,180,216,0.04) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0,180,216,0.04) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }

        /* Glow */
        body::after {
            content: '';
            position: fixed;
            top: -20%;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 600px;
            background: radial-gradient(ellipse, rgba(0,180,216,0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        /* NAV */
        nav {
            position: relative;
            z-index: 10;
            padding: 20px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(0,180,216,0.1);
        }
        .nav-logo {
            font-size: 1.4rem;
            font-weight: 800;
            color: white;
            text-decoration: none;
            letter-spacing: -0.5px;
        }
        .nav-logo span { color: var(--teal); }
        .nav-back {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }
        .nav-back:hover { color: var(--teal); }

        /* MAIN */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        .login-wrapper {
            width: 100%;
            max-width: 440px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 36px;
        }
        .login-header .fish-icon {
            font-size: 2.5rem;
            margin-bottom: 16px;
        }
        .login-header h1 {
            font-size: 1.9rem;
            font-weight: 800;
            color: white;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }
        .login-header p {
            font-size: 0.875rem;
            color: rgba(255,255,255,0.5);
        }

        .login-card {
            background: var(--deep);
            border: 1px solid rgba(0,180,216,0.2);
            border-radius: 14px;
            padding: 40px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
        }
        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--teal), var(--seafoam), transparent);
        }

        /* ALERTS */
        .alert-custom {
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid rgba(220, 53, 69, 0.3);
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 0.875rem;
            color: #ff8080;
            margin-bottom: 24px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }
        .alert-custom i { margin-top: 1px; flex-shrink: 0; }

        /* FORM */
        .form-group { margin-bottom: 20px; }
        .form-label-custom {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: rgba(255,255,255,0.7);
            margin-bottom: 8px;
            letter-spacing: 0.2px;
        }
        .form-input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            padding: 13px 16px;
            color: white;
            font-family: 'Sora', sans-serif;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
        }
        .form-input:focus {
            border-color: var(--teal);
            background: rgba(0,180,216,0.05);
        }
        .form-input::placeholder { color: rgba(255,255,255,0.25); }

        .btn-login {
            width: 100%;
            background: var(--teal);
            color: var(--navy);
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            font-family: 'Sora', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-login:hover {
            background: var(--seafoam);
            transform: translateY(-1px);
        }

        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.45);
        }
        .login-footer a {
            color: var(--teal);
            text-decoration: none;
            font-weight: 600;
        }
        .login-footer a:hover { text-decoration: underline; }

        /* PAGE FOOTER */
        footer {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 24px;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.2);
            border-top: 1px solid rgba(255,255,255,0.04);
        }
        footer a { color: rgba(255,255,255,0.35); text-decoration: none; }
        footer a:hover { color: var(--teal); }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-wrapper { animation: fadeUp 0.5s ease both; }
    </style>
</head>
<body>

<nav>
    <a href="/" class="nav-logo">Fish<span>Teck</span></a>
    <a href="/" class="nav-back"><i class="bi bi-arrow-left"></i> Back to home</a>
</nav>

<main>
    <div class="login-wrapper">
        <div class="login-header">
            <div class="fish-icon">🐟</div>
            <h1>Welcome back</h1>
            <p>Sign in to your FishTeck account</p>
        </div>

        <div class="login-card">

            {% if messages %}
                {% for message in messages %}
                <div class="alert-custom">
                    <i class="bi bi-exclamation-circle"></i>
                    {{ message }}
                </div>
                {% endfor %}
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label for="username" class="form-label-custom">Username</label>
                    <input type="text" class="form-input" id="username" name="username" placeholder="Enter your username" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password" class="form-label-custom">Password</label>
                    <input type="password" class="form-input" id="password" name="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn-login">
                    Sign In <i class="bi bi-arrow-right"></i>
                </button>
            </form>

            <div class="login-footer">
                New company? <a href="{% url 'register' %}">Start your free trial</a>
            </div>
        </div>
    </div>
</main>

<footer>
    <a href="/privacy-policy/">Privacy Policy</a> &nbsp;·&nbsp;
    <a href="/terms-of-service/">Terms of Service</a> &nbsp;·&nbsp;
    © 2025 FishTeck
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
