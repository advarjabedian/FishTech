<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - FishTeck</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8fafc; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
        .register-card { width: 100%; max-width: 560px; background: #fff; border: 1px solid #dbe7f3; border-radius: 20px; box-shadow: 0 16px 36px rgba(15, 23, 42, 0.08); padding: 2rem; }
        .register-card h1 { font-size: 1.8rem; font-weight: 800; color: #0f172a; margin-bottom: 0.35rem; }
        .register-card p { color: #64748b; margin-bottom: 1.5rem; }
        .form-label { font-size: 0.78rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.04em; color: #475569; }
        .form-control { border-radius: 12px; padding: 0.8rem 0.95rem; }
        .btn-primary { border-radius: 12px; padding: 0.85rem 1rem; font-weight: 700; }
    </style>
</head>
<body>
    <div class="register-card">
        <h1>Create Tenant</h1>
        <p>Set up a new workspace for receiving, cutting, inventory, sales, vendors, and customers.</p>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags|default:'info' }}">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Business Name</label>
                <input class="form-control" type="text" name="company_name" required>
            </div>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Username</label>
                    <input class="form-control" type="text" name="username" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Email</label>
                    <input class="form-control" type="email" name="email">
                </div>
                <div class="col-md-6">
                    <label class="form-label">First Name</label>
                    <input class="form-control" type="text" name="first_name">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Last Name</label>
                    <input class="form-control" type="text" name="last_name">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Password</label>
                    <input class="form-control" type="password" name="password" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Confirm Password</label>
                    <input class="form-control" type="password" name="password_confirm" required>
                </div>
            </div>
            <div class="d-grid mt-4">
                <button class="btn btn-primary" type="submit">Create Account</button>
            </div>
            <div class="text-center mt-3">
                <a href="{% url 'login' %}">Back to login</a>
            </div>
        </form>
    </div>
</body>
</html>
