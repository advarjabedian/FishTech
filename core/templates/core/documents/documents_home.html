{% extends 'core/base.html' %}

{% block title %}Documents - FishTeck{% endblock %}

{% block extra_css %}
<style>
    .document-card {
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        height: 100%;
        cursor: pointer;
        min-height: 200px;
    }
    
    .document-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }
    
    .document-icon {
        font-size: 3rem;
        margin-bottom: 15px;
    }
    
    .document-card .card-body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 2rem;
    }
    
    .document-title {
        font-size: 1.25rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
    }
    
    .document-description {
        color: #6c757d;
        font-size: 0.95rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1><i class="bi bi-file-earmark-text me-2"></i>Documents</h1>
        <a href="{% url 'operations_hub' %}" class="btn btn-secondary">
            <i class="bi bi-house me-1"></i>Back to Operations
        </a>
    </div>
    
    <div class="row g-4">
        <!-- Licenses -->
        <div class="col-md-4">
            <div class="card document-card bg-danger bg-opacity-10 border-danger" onclick="window.location.href='{% url 'licenses' %}'">
                <div class="card-body">
                    <i class="bi bi-file-earmark-medical document-icon text-danger"></i>
                    <h5 class="document-title">Licenses</h5>
                    <p class="document-description">Business Licenses</p>
                </div>
            </div>
        </div>
        
        <!-- Vehicles -->
        <div class="col-md-4">
            <div class="card document-card bg-dark bg-opacity-10 border-dark" onclick="window.location.href='{% url 'vehicles' %}'">
                <div class="card-body">
                    <i class="bi bi-truck document-icon text-dark"></i>
                    <h5 class="document-title">Vehicles</h5>
                    <p class="document-description">Fleet Management</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
